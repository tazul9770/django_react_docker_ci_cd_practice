{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Card</title>
  <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="max-w-sm w-full bg-white shadow-lg rounded-lg p-6">
    <div class="flex items-center space-x-4">
      <div class="w-16 h-16 bg-blue-500 text-white flex items-center justify-center rounded-full text-xl font-bold">
        {{name|slice:":1"}}
      </div>
      <div>
        <h2 class="text-xl font-semibold text-gray-800">{{name}}</h2>
        <p class="text-gray-600">Age: {{age}}</p>
        <p class="text-gray-600">Sex: {{sex}}</p>
      </div>
    </div>
    <div class="mt-4">
      <button class="w-full bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition">
        View Profile
      </button>
    </div>
  </div>
</body>
</html>
